services:
  api:
    build: .
    ports:
      - "3000"
    environment:
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped

  mcp:
    build: .
    command: ["bun", "src/mcp/http.ts"]
    ports:
      - "3001"
    environment:
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped

  scheduler:
    build: .
    command: ["bun", "src/jobs/scheduler.ts"]
    environment:
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped
