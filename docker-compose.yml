services:
  api:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "bun install && bun run src/api/server.ts"
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped

  mcp:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "bun install && bun run src/mcp/http.ts"
    ports:
      - "3003:3003"
    environment:
      - MCP_PORT=3003
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped
    depends_on:
      - api

  scheduler:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "bun install && bun run src/jobs/scheduler.ts"
    environment:
      - REDIS_URL=${REDIS_DOCKER_URL:-redis://172.17.0.1:6379}
    restart: unless-stopped
    depends_on:
      - api

volumes:
  node_modules:
